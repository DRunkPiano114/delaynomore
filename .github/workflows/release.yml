name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run tests
        run: swift test

      - name: Import certificate to keychain
        env:
          DEVELOPER_ID_CERT_P12: ${{ secrets.DEVELOPER_ID_CERT_P12 }}
          DEVELOPER_ID_CERT_PASSWORD: ${{ secrets.DEVELOPER_ID_CERT_PASSWORD }}
          KEYCHAIN_PASSWORD: ${{ secrets.KEYCHAIN_PASSWORD }}
        run: |
          KEYCHAIN_PATH="$RUNNER_TEMP/build.keychain-db"
          CERT_PATH="$RUNNER_TEMP/cert.p12"

          echo -n "$DEVELOPER_ID_CERT_P12" | base64 --decode > "$CERT_PATH"

          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"

          security import "$CERT_PATH" \
            -P "$DEVELOPER_ID_CERT_PASSWORD" \
            -A -t cert -f pkcs12 \
            -k "$KEYCHAIN_PATH"

          security set-key-partition-list \
            -S apple-tool:,apple: \
            -s -k "$KEYCHAIN_PASSWORD" \
            "$KEYCHAIN_PATH"

          security list-keychain -d user -s "$KEYCHAIN_PATH" \
            $(security list-keychains -d user | tr -d '"')

          security find-identity -v -p codesigning "$KEYCHAIN_PATH"

          rm "$CERT_PATH"

      - name: Build and sign app
        env:
          SIGNING_IDENTITY: "Developer ID Application: Lingwei Wu (${{ secrets.APPLE_TEAM_ID }})"
        run: |
          APP_VERSION="${GITHUB_REF_NAME#v}"
          export APP_VERSION
          bash scripts/build-app.sh

      - name: Notarize and staple
        env:
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          cd .build/app
          ditto -c -k --keepParent DelayNoMore.app DelayNoMore-notarize.zip

          xcrun notarytool submit DelayNoMore-notarize.zip \
            --apple-id "$APPLE_ID" \
            --password "$APPLE_APP_SPECIFIC_PASSWORD" \
            --team-id "$APPLE_TEAM_ID" \
            --wait

          xcrun stapler staple DelayNoMore.app
          spctl -a -t exec -vv DelayNoMore.app

          rm DelayNoMore-notarize.zip

      - name: Package zip
        run: |
          cd .build/app
          ditto -c -k --keepParent DelayNoMore.app "$GITHUB_WORKSPACE/DelayNoMore.zip"

      - name: Generate release notes
        run: |
          PREV_TAG=$(git tag --sort=-v:refname | grep '^v' | sed -n '2p')
          VERSION="${GITHUB_REF_NAME#v}"
          SHA256=$(shasum -a 256 DelayNoMore.zip | awk '{print $1}')

          {
            echo "## What's Changed"
            echo ""

            if [ -n "$PREV_TAG" ]; then
              RANGE="${PREV_TAG}..${GITHUB_REF_NAME}"
            else
              RANGE="${GITHUB_REF_NAME}"
            fi

            feat=$(git log "$RANGE" --pretty=format:"- %s" --grep="^feat" --extended-regexp | sed 's/^- feat: /- /; s/^- feat(/- (/')
            fix=$(git log "$RANGE" --pretty=format:"- %s" --grep="^fix" --extended-regexp | sed 's/^- fix: /- /; s/^- fix(/- (/')
            docs=$(git log "$RANGE" --pretty=format:"- %s" --grep="^docs" --extended-regexp | sed 's/^- docs: /- /; s/^- docs(/- (/')
            other=$(git log "$RANGE" --pretty=format:"- %s" --grep="^refactor\|^chore\|^ci\|^perf\|^style\|^test" --extended-regexp | sed 's/^- [a-z]*: /- /; s/^- [a-z]*(/- (/')

            if [ -n "$feat" ]; then
              echo "### Features"
              echo "$feat"
              echo ""
            fi
            if [ -n "$fix" ]; then
              echo "### Fixes"
              echo "$fix"
              echo ""
            fi
            if [ -n "$docs" ]; then
              echo "### Docs"
              echo "$docs"
              echo ""
            fi
            if [ -n "$other" ]; then
              echo "### Other"
              echo "$other"
              echo ""
            fi

            if [ -n "$PREV_TAG" ]; then
              echo "**Full Changelog**: [\`${PREV_TAG}...${GITHUB_REF_NAME}\`](https://github.com/$GITHUB_REPOSITORY/compare/${PREV_TAG}...${GITHUB_REF_NAME})"
              echo ""
            fi

            echo "## Install"
            echo "Download \`DelayNoMore.zip\`, unzip, and drag to Applications."
            echo ""
            echo "## Verify (SHA256)"
            echo "\`\`\`"
            echo "${SHA256}  DelayNoMore.zip"
            echo "\`\`\`"
          } > release-notes.md

      - name: Create release
        run: |
          gh release create "$GITHUB_REF_NAME" \
            DelayNoMore.zip \
            --title "$GITHUB_REF_NAME" \
            --notes-file release-notes.md
        env:
          GH_TOKEN: ${{ github.token }}
